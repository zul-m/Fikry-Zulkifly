name: Release Notification
on:
  release:
    types: [published]
jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Send Telegram message
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          URL: ${{ github.event.release.html_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..${TAG}" | head -20 | sed 's/^/- /')
          else
            COMMITS=$(git log --oneline "$TAG" | head -20 | sed 's/^/- /')
          fi

          MESSAGE=$(printf 'New Release: %s\n\nRepository: %s\n\nRelease Notes:\n%s\n\nCommits:\n%s\n\nURL: %s' \
            "${TAG}" "${REPO}" "${RELEASE_BODY}" "${COMMITS}" "${URL}")

          jq -n \
            --arg chat_id "${CHAT_ID}" \
            --arg text "${MESSAGE}" \
            '{"chat_id": $chat_id, "text": $text}' | \
          curl -s --fail -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @-
