name: Release Notification
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-test'
      release_body:
        description: 'Release notes'
        required: false
        default: 'Test release'
jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.target_commitish == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Send Telegram message
        env:
          RELEASE_BODY: ${{ github.event_name == 'workflow_dispatch' && inputs.release_body || github.event.release.body }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          URL: ${{ github.event.release.html_url || 'https://github.com' }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..${TAG}" | head -20 | sed 's/^/- /')
          else
            COMMITS=$(git log --oneline "$TAG" | head -20 | sed 's/^/- /')
          fi

          MESSAGE="New Release: ${TAG}

Repository: ${REPO}

Release Notes:
${RELEASE_BODY}

Commits:
${COMMITS}

URL: ${URL}"

          jq -n \
            --arg chat_id "${CHAT_ID}" \
            --arg text "${MESSAGE}" \
            '{"chat_id": $chat_id, "text": $text}' | \
          curl -s --fail -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @-
